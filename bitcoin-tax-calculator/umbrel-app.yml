manifestVersion: 1
id: bitcoin-tax-calculator
name: Bitcoin Tax Calculator
tagline: Calculate Bitcoin capital gains for NZ IRD using the WAC method
icon: https://raw.githubusercontent.com/onesandzeros-nz/bitcoin-tax-calculator-umbrel/main/bitcoin-tax-calculator/icon.svg
category: Finance
version: "1.0.0"
port: 3123
description: >-
    Calculate your Bitcoin capital gains for tax purposes without revealing your
    full transaction history to your accountant. Import CSV data from Easy Crypto,
    Lightning Pay, Xapo, Kraken, and CoinCorner, then calculate Weighted Average
    Cost (WAC) for New Zealand IRD reporting.


    You run the calculations yourself and provide only the final tax-relevant
    figures — total capital gains/losses, opening and closing cost bases — keeping
    your full transaction history and balances private.


    Features:

    - Multi-source CSV import (Easy Crypto, Lightning Pay, Xapo, Kraken, CoinCorner)

    - Automated Weighted Average Cost (WAC) calculation

    - Tax year management with NZ tax year dates (Apr 1 - Mar 31)

    - Detailed reporting and calculations breakdown

    - All raw data preserved for audit
